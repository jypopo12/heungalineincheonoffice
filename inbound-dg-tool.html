<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수입 위험물 업무 툴</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #f0883e;
    --accent2: #388bfd;
    --text: #e6edf3;
    --text-sub: #7d8590;
    --text-dim: #484f58;
    --ok: #3fb950;
    --warn: #f0883e;
    --danger: #f85149;
    --chip-bg: #21262d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    min-height: 100vh;
  }

  /* nav */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .nav-back {
    font-size: 12px;
    color: var(--text-sub);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    transition: color 0.15s, border-color 0.15s;
  }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }
  .nav-title { font-size: 14px; font-weight: 600; }
  .nav-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    background: var(--chip-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-sub);
  }

  /* 탭 */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--bg);
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; padding: 24px; }
  .panel.active { display: block; }

  /* 업로드 카드 */
  .upload-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .upload-card {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .upload-card.ready { border-style: solid; border-color: var(--ok); }
  .upload-card.drag {
    border-color: var(--accent);
    background: rgba(240,136,62,0.05);
  }
  .upload-card h3 {
    font-size: 11px;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .upload-card .fname {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    min-height: 18px;
  }
  .upload-card .fcount { font-size: 11px; color: var(--text-sub); margin-bottom: 10px; }
  .file-btn {
    display: inline-block;
    padding: 6px 14px;
    background: var(--chip-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .file-btn:hover { border-color: var(--accent); color: var(--accent); }
  input[type=file] { display: none; }

  /* 실행 버튼 */
  .run-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .run-btn {
    padding: 9px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .run-btn:disabled { background: var(--text-dim); cursor: not-allowed; }
  .run-btn:hover:not(:disabled) { background: #d97a38; }
  .status { font-size: 12px; color: var(--text-sub); }

  /* 결과 테이블 */
  .result-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    font-size: 12px;
  }
  th {
    background: #1c2330;
    color: var(--text-sub);
    padding: 9px 12px;
    text-align: left;
    font-weight: 600;
    white-space: nowrap;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 12px;
    border-bottom: 1px solid #21262d;
    vertical-align: top;
    line-height: 1.5;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2330; }

  .imdg-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .imdg-3  { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
  .imdg-6  { background: rgba(130,80,223,0.15); color: #a371f7; border: 1px solid rgba(130,80,223,0.3); }
  .imdg-8  { background: rgba(240,136,62,0.15); color: #f0883e; border: 1px solid rgba(240,136,62,0.3); }
  .imdg-9  { background: rgba(56,139,253,0.15); color: #79c0ff; border: 1px solid rgba(56,139,253,0.3); }
  .imdg-other { background: var(--chip-bg); color: var(--text-sub); border: 1px solid var(--border); }

  .직반출-y { color: var(--danger); font-weight: 700; }
  .직반출-n { color: var(--text-dim); }

  .psn-cell { max-width: 220px; line-height: 1.5; }
  .un-cell { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .cntr-cell { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

  /* 요약 */
  .summary-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .sum-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }
  .sum-total { background: var(--chip-bg); border: 1px solid var(--border); color: var(--text); }
  .sum-3     { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3); color: #f85149; }
  .sum-6     { background: rgba(130,80,223,0.12); border: 1px solid rgba(130,80,223,0.3); color: #a371f7; }
  .sum-8     { background: rgba(240,136,62,0.12); border: 1px solid rgba(240,136,62,0.3); color: #f0883e; }
  .sum-9     { background: rgba(56,139,253,0.12); border: 1px solid rgba(56,139,253,0.3); color: #79c0ff; }

  .mail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .mail-card:hover { border-color: var(--accent); }
  .mail-card.selected { border-color: var(--accent); background: var(--surface2); }
  .mail-card-bl { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; min-width: 160px; }
  .mail-card-info { font-size: 12px; color: var(--text-sub); flex: 1; }
  .mail-card-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }

  .empty-msg {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    background: var(--surface);
    border-radius: 8px;
  }

  /* 섹션 타이틀 */
  .section-hdr {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .section-hdr span {
    font-size: 11px;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }
  .section-hdr::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 복사 버튼 */
  .copy-btn {
    padding: 5px 12px;
    background: var(--chip-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-sub);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    margin-left: auto;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-back" href="index.html">← 홈</a>
    <span class="nav-title">수입 위험물 업무</span>
  </div>
  <span class="nav-badge">INBOUND DG</span>
</nav>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('contact')">📞 위험물 연락처 매칭</div>
  <div class="tab" onclick="switchTab('mail')">✉️ 직반출 안내 메일</div>
</div>

<!-- ══ TAB 1: 연락처 매칭 ══ -->
<div class="panel active" id="panel-contact">

  <div class="upload-row">
    <div class="upload-card" id="card-inb" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event,'card-inb')" ondrop="handleDrop(event,'inb')">
      <h3>① INB 데이터</h3>
      <div class="fname" id="name-inb">파일을 선택하거나 드래그하세요</div>
      <div class="fcount" id="count-inb"></div>
      <label class="file-btn" for="file-inb">📂 파일 선택</label>
      <input type="file" id="file-inb" accept=".xls,.xlsx">
    </div>
    <div class="upload-card" id="card-dg" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event,'card-dg')" ondrop="handleDrop(event,'dg')">
      <h3>② DG LIST</h3>
      <div class="fname" id="name-dg">파일을 선택하거나 드래그하세요</div>
      <div class="fcount" id="count-dg"></div>
      <label class="file-btn" for="file-dg">📂 파일 선택</label>
      <input type="file" id="file-dg" accept=".xls,.xlsx">
    </div>
  </div>

  <div class="run-row">
    <button class="run-btn" id="runBtn" disabled onclick="runMatch()">▶ 연락처 매칭 실행</button>
    <button class="copy-btn" id="copyBtn" style="display:none;" onclick="copyTableHtml()">📋 표 복사 (엑셀 붙여넣기용)</button>
    <span class="status" id="status"></span>
  </div>

  <div id="result-contact">
    <div class="empty-msg">INB 파일과 DG LIST 파일을 업로드하고 실행하세요.</div>
  </div>

</div>

<!-- ══ TAB 2: 직반출 메일 ══ -->
<div class="panel" id="panel-mail">

  <div id="mail-empty" class="empty-msg">
    연락처 매칭 탭에서 직반출 항목을 클릭하거나, 아래에서 직접 선택하세요.
  </div>

  <!-- 직반출 대상 목록 -->
  <div id="mail-list" style="display:none; margin-bottom:20px;">
    <div class="section-hdr"><span>직반출 대상 화물</span></div>
    <div id="mail-cards" style="display:flex; flex-direction:column; gap:10px;"></div>
  </div>

  <!-- 메일 본문 -->
  <div id="mail-body-wrap" style="display:none;">
    <div class="section-hdr" style="margin-top:20px;"><span>메일 초안</span></div>
    <div style="display:flex; gap:12px; margin-bottom:12px; align-items:center;">
      <div style="font-size:11px; color:var(--text-sub);">
        수신: <span id="mail-to" style="color:var(--text); font-weight:600;"></span>
      </div>
      <div style="font-size:11px; color:var(--text-sub);">
        제목: <span id="mail-subject" style="color:var(--text);"></span>
      </div>
      <button class="copy-btn" onclick="copyMail()" style="margin-left:auto;">📋 메일 복사</button>
    </div>
    <textarea id="mail-content" style="
      width:100%; height:400px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; color:var(--text);
      font-family:'IBM Plex Sans KR', sans-serif;
      font-size:13px; line-height:1.8;
      padding:20px; resize:vertical;
      outline:none;
    "></textarea>
  </div>

</div>

<script>
let inbData = [], dgData = [];

// ── 드래그앤드롭 ──
function handleDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.add('drag');
}
function handleDragLeave(e, cardId) {
  e.preventDefault();
  document.getElementById(cardId).classList.remove('drag');
}
function handleDrop(e, type) {
  e.preventDefault();
  e.stopPropagation();
  const cardId = type === 'inb' ? 'card-inb' : 'card-dg';
  document.getElementById(cardId).classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (type === 'inb') {
    readXLS(file, 'inb');
  } else {
    // DG LIST drop - file-dg change 이벤트와 동일한 처리
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      const headers = rows[0].map(h => String(h).trim());
      const cntrPattern = /^[A-Z]{4}\d{7}$/;
      const cntrIdx = headers.findIndex(h => h === 'CNTR No');
      const parsed = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row.every(c => c === '')) continue;
        if (cntrIdx >= 0 && !cntrPattern.test(String(row[cntrIdx] ?? '').trim())) continue;
        const obj = {};
        headers.forEach((h, j) => obj[h] = String(row[j] ?? '').trim());
        parsed.push(obj);
      }
      dgData = parsed;
      document.getElementById('name-dg').textContent = file.name;
      document.getElementById('count-dg').textContent = `${parsed.length}건 로드됨`;
      document.getElementById('card-dg').classList.add('ready');
      document.getElementById('runBtn').disabled = !(inbData.length && dgData.length);
    };
    reader.readAsBinaryString(file);
  }
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── 파일 읽기 ──
function readXLS(file, type) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (rows.length < 2) return;

    const headers = rows[0].map(h => String(h).trim());
    const parsed = [];
    const cntrPattern = /^[A-Z]{4}\d{7}$/;
    const cntrIdx = headers.findIndex(h => ['CNTR No', 'CNTR NO'].includes(h));

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (row.every(c => c === '')) continue;
      // 합계행 제거
      if (cntrIdx >= 0 && !cntrPattern.test(String(row[cntrIdx] ?? '').trim())) continue;
      const obj = {};
      headers.forEach((h, j) => obj[h] = String(row[j] ?? '').trim());
      parsed.push(obj);
    }

    if (type === 'inb') {
      // INB는 컨테이너 패턴 필터 없이 전체
      const allRows = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row.every(c => c === '')) continue;
        const obj = {};
        headers.forEach((h, j) => obj[h] = String(row[j] ?? '').trim());
        // BL No. 있는 행만
        if (obj['B/L No.']) allRows.push(obj);
      }
      inbData = allRows;
      document.getElementById('name-inb').textContent = file.name;
      document.getElementById('count-inb').textContent = `${allRows.length}건 로드됨`;
      document.getElementById('card-inb').classList.add('ready');
    } else {
      dgData = parsed;
      document.getElementById('name-dg').textContent = file.name;
      document.getElementById('count-dg').textContent = `${parsed.length}건 로드됨`;
      document.getElementById('card-dg').classList.add('ready');
    }
    document.getElementById('runBtn').disabled = !(inbData.length && dgData.length);
  };
  reader.readAsBinaryString(file);
}

document.getElementById('file-inb').addEventListener('change', e => {
  if (e.target.files[0]) readXLS(e.target.files[0], 'inb');
});
document.getElementById('file-dg').addEventListener('change', e => {
  if (e.target.files[0]) {
    // DG LIST는 컨테이너 번호 기준 필터 적용
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      const headers = rows[0].map(h => String(h).trim());
      const cntrPattern = /^[A-Z]{4}\d{7}$/;
      const cntrIdx = headers.findIndex(h => h === 'CNTR No');
      const parsed = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row.every(c => c === '')) continue;
        if (cntrIdx >= 0 && !cntrPattern.test(String(row[cntrIdx] ?? '').trim())) continue;
        const obj = {};
        headers.forEach((h, j) => obj[h] = String(row[j] ?? '').trim());
        parsed.push(obj);
      }
      dgData = parsed;
      document.getElementById('name-dg').textContent = e.target.files[0].name;
      document.getElementById('count-dg').textContent = `${parsed.length}건 로드됨`;
      document.getElementById('card-dg').classList.add('ready');
      document.getElementById('runBtn').disabled = !(inbData.length && dgData.length);
    };
    reader.readAsBinaryString(e.target.files[0]);
  }
});

// ── IMDG 뱃지 ──
function imdgBadge(imdg) {
  const v = String(imdg).trim();
  const cls = v.startsWith('3') ? 'imdg-3'
             : v.startsWith('6') ? 'imdg-6'
             : v.startsWith('8') ? 'imdg-8'
             : v.startsWith('9') ? 'imdg-9'
             : 'imdg-other';
  return `<span class="imdg-badge ${cls}">Class ${v}</span>`;
}

// ── 전역 결과 저장 ──
let lastResults = [];

// ── HTML 표 복사 (엑셀 붙여넣기용) ──
function copyTableHtml() {
  const imdgBg = { '3':'#FFD0D0','6':'#E8D5FF','8':'#FFE5C0','9':'#D0E4FF' };

  let html = `<table border="1" style="border-collapse:collapse;font-family:맑은 고딕,Arial;font-size:10pt;">
  <thead><tr>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">BLNO</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">CNTR No</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">하역(자동)</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">IMDG</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">UNNO</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">총중량</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">적정선적명</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">업체명</th>
    <th style="background:#1F3864;color:white;font-weight:bold;padding:5px 10px;white-space:nowrap;">연락처</th>
  </tr></thead><tbody>`;

  let rowIdx = 0;
  lastResults.forEach(r => {
    r.dgItems.forEach((dg, dgIdx) => {
      const imdgKey = String(dg.imdg).trim().charAt(0);
      const imdgBgColor = imdgBg[imdgKey] || '#FFFFFF';
      const rowBg = rowIdx % 2 === 0 ? '#FFFFFF' : '#EEF2FF';

      const cntrs = r.cntrs.length > 0 ? r.cntrs : [''];
      cntrs.forEach((cntr, ci) => {
        const isFirst = dgIdx === 0 && ci === 0;
        const td = (val, extra='') =>
          `<td style="padding:4px 8px;background:${rowBg};border:1px solid #CCCCCC;${extra}">${val}</td>`;

        html += `<tr>
          ${td(r.bl)}
          ${td(cntr, 'text-align:center;')}
          ${td('양하', 'text-align:center;')}
          <td style="padding:4px 8px;background:${imdgBgColor};border:1px solid #CCCCCC;text-align:center;font-weight:bold;">${dg.imdg}</td>
          ${td(dg.un, 'text-align:center;')}
          ${td(dg.wt, 'text-align:center;')}
          ${td(dg.psn)}
          ${td(isFirst ? r.consignee : '')}
          ${td(isFirst ? r.tel : '')}
        </tr>`;
        rowIdx++;
      });
    });
  });

  html += '</tbody></table>';

  // ClipboardItem으로 HTML 복사
  const blob = new Blob([html], { type: 'text/html' });
  const item = new ClipboardItem({ 'text/html': blob });
  navigator.clipboard.write([item]).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 복사됨! 엑셀에 붙여넣기 하세요';
    setTimeout(() => { btn.textContent = '📋 표 복사 (엑셀 붙여넣기용)'; }, 3000);
  }).catch(() => {
    alert('복사 실패: 브라우저에서 클립보드 권한을 허용해주세요.');
  });
}

// ── Excel 다운로드 (HTML 테이블 → XLS 방식, 스타일 적용) ──
function exportExcel() {
  if (!lastResults.length) return;

  // IMDG 색상
  const imdgBg = { '3':'#FFD0D0','6':'#E8D5FF','8':'#FFE5C0','9':'#D0E4FF' };

  // HTML 테이블 생성
  let tableHtml = `
  <html xmlns:o="urn:schemas-microsoft-com:office:office"
        xmlns:x="urn:schemas-microsoft-com:office:excel"
        xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="UTF-8">
  <style>
    body { font-family: 맑은 고딕, Arial; font-size: 10pt; }
    table { border-collapse: collapse; width: 100%; }
    th {
      background-color: #1F3864;
      color: white;
      font-weight: bold;
      font-size: 10pt;
      text-align: center;
      border: 1px solid #999;
      padding: 5px 8px;
      white-space: nowrap;
    }
    td {
      font-size: 10pt;
      border: 1px solid #CCCCCC;
      padding: 4px 8px;
      vertical-align: middle;
    }
    .even { background-color: #FFFFFF; }
    .odd  { background-color: #EEF2FF; }
    .imdg { font-weight: bold; text-align: center; }
    .center { text-align: center; }
  </style>
  </head><body>
  <table>
    <thead><tr>
      <th>BLNO</th><th>CNTR No</th><th>하역(자동)</th>
      <th>IMDG</th><th>UNNO</th><th>총중량</th>
      <th>적정선적명</th><th>업체명</th><th>연락처</th>
    </tr></thead>
    <tbody>`;

  let rowIdx = 0;
  lastResults.forEach(r => {
    r.dgItems.forEach((dg, dgIdx) => {
      const imdgKey = String(dg.imdg).trim().charAt(0);
      const imdgStyle = imdgBg[imdgKey] ? `background-color:${imdgBg[imdgKey]};` : '';
      const cls = rowIdx % 2 === 0 ? 'even' : 'odd';

      r.cntrs.forEach((cntr, ci) => {
        const isFirst = dgIdx === 0 && ci === 0;
        tableHtml += `<tr>
          <td class="${cls}">${r.bl}</td>
          <td class="${cls} center">${cntr}</td>
          <td class="${cls} center">양하</td>
          <td class="imdg" style="${imdgStyle}">${dg.imdg}</td>
          <td class="${cls} center">${dg.un}</td>
          <td class="${cls} center">${dg.wt}</td>
          <td class="${cls}">${dg.psn}</td>
          <td class="${cls}">${isFirst ? r.consignee : ''}</td>
          <td class="${cls}">${isFirst ? r.tel : ''}</td>
        </tr>`;
        rowIdx++;
      });

      if (r.cntrs.length === 0) {
        tableHtml += `<tr>
          <td class="${cls}">${r.bl}</td>
          <td class="${cls}"></td>
          <td class="${cls} center">양하</td>
          <td class="imdg" style="${imdgStyle}">${dg.imdg}</td>
          <td class="${cls} center">${dg.un}</td>
          <td class="${cls} center">${dg.wt}</td>
          <td class="${cls}">${dg.psn}</td>
          <td class="${cls}">${r.consignee}</td>
          <td class="${cls}">${r.tel}</td>
        </tr>`;
        rowIdx++;
      }
    });
  });

  tableHtml += `</tbody></table></body></html>`;

  // Blob으로 다운로드
  const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `수입위험물현황_${dateStr}.xls`;
  a.click();
  URL.revokeObjectURL(url);
}


// ── 직반출 대상 Class ──
const DG_DIRECT_CLASSES = [
  '1.1','1.2','1.3','1.4','1.5','1.6',
  '2.1','2.2','2.3',
  '4.1','4.2','4.3',
  '5.1','5.2',
  '6.2',
  '7',
  '8'
];

// ── 터미널 코드 → 담당자 ──
const TERMINAL_MAP = {
  '02012007': 'E1터미널 플래너 T.032-880-2321~2',
  '02077002': 'ICT 플래너 T.032-890-8812~4',
  '02012014': 'SNCT 플래너 T.032-724-1262~5',
  '02012016': 'HJIT 플래너 T.032-202-4941~3',
};

// Class가 직반출 대상인지 판단 (정확히 일치만)
function isDirectClass(imdg) {
  const v = String(imdg).trim();
  return DG_DIRECT_CLASSES.includes(v);
}

// ── 연락처 추출 ──
function extractTel(cName, cAddr) {
  const combined = (cName || '') + (cAddr || '');
  const patterns = [
    /(?:TEL(?:EPHONE)?|PHONE)\s*[:#\s]*(\+?82[\s\-\d]{7,})/i,
    /(?:TEL(?:EPHONE)?|PHONE)\s*[:#\s]*(0\d[\s\-\d]{7,})/i,
  ];
  for (const p of patterns) {
    const m = combined.match(p);
    if (m) {
      return m[1].replace(/[^\d\+\-]/g, '').replace(/-+$/, '');
    }
  }
  return '-';
}

// ── 메일 탭으로 이동 + 선택 ──
function switchToMail(bl) {
  // 탭 전환
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.getElementById('panel-mail').classList.add('active');
  renderMailList(bl);
}

function renderMailList(selectedBl) {
  const directList = lastResults.filter(r => r.hasDirect);
  if (!directList.length) {
    document.getElementById('mail-empty').style.display = 'block';
    document.getElementById('mail-list').style.display = 'none';
    return;
  }
  document.getElementById('mail-empty').style.display = 'none';
  document.getElementById('mail-list').style.display = 'block';

  const cardsHtml = directList.map(r => {
    const badge = r.is8
      ? '<span class="mail-card-badge" style="background:rgba(248,81,73,0.15);color:#f85149;">72h</span>'
      : '<span class="mail-card-badge" style="background:rgba(240,136,62,0.15);color:#f0883e;">직반출</span>';
    const classes = [...new Set(r.dgItems.map(d => d.imdg))].join(', ');
    return `<div class="mail-card ${r.bl === selectedBl ? 'selected' : ''}" onclick="selectMailBl('${r.bl}')">
      <div class="mail-card-bl">${r.bl}</div>
      <div class="mail-card-info">${r.consignee} · Class ${classes}</div>
      ${badge}
    </div>`;
  }).join('');
  document.getElementById('mail-cards').innerHTML = cardsHtml;

  if (selectedBl) selectMailBl(selectedBl);
}

function selectMailBl(bl) {
  // 선택 표시
  document.querySelectorAll('.mail-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.mail-card').forEach(c => {
    if (c.querySelector('.mail-card-bl').textContent === bl) c.classList.add('selected');
  });

  const r = lastResults.find(r => r.bl === bl);
  if (!r) return;

  const classes = [...new Set(r.dgItems.map(d => d.imdg))].join(', ');
  const unNos   = [...new Set(r.dgItems.map(d => d.un))].join(', ');
  const psns    = [...new Set(r.dgItems.map(d => d.psn))].join('\n              ');
  const cntrs   = r.cntrs.join(', ') || '-';

  const subject = `[${r.vyg.trim()}] 수입 위험물 직반출 안내 - ${bl}`;
  const timeNote = r.is8 ? '\n  ※ Class 8 화물은 입항 후 72시간 이내 반출이 필수입니다.' : '';

  const body =
`담당자님 안녕하세요. 흥아라인 인천사무소입니다.

해당 화물은 위험물(DG Cargo)로, 「위험물 선박운송 및 저장규칙」 등 관계 규정에 따른 안전관리 대상 화물입니다.
이에 따라 화물 도착 즉시 직반출이 이루어질 수 있도록 사전에 반출 준비를 완료하여 주시기 바랍니다.
직반출이 지연될 경우 Ship Back(반송)이 진행될 수 있으므로, 반드시 도착 즉시 반출이 이루어질 수 있도록 협조하여 주시기 바랍니다.
아래 터미널 담당자와 협의하여 직반출 될 수 있도록 조치바랍니다.

*터미널 담당자 : ${r.terminal}

■ 화물 정보
  B/L No.   : ${bl}
  Container : ${cntrs}
  Class     : ${classes}
  UN No.    : ${unNos}
  품명       : ${psns}
  입항 예정  : ${r.eta}${timeNote}

감사합니다.
흥아라인 인천사무소`;

  document.getElementById('mail-to').textContent = `${r.consignee} (${r.tel})`;
  document.getElementById('mail-subject').textContent = subject;
  document.getElementById('mail-content').value = body;
  document.getElementById('mail-body-wrap').style.display = 'block';
}

function copyMail() {
  const subject = document.getElementById('mail-subject').textContent;
  const body    = document.getElementById('mail-content').value;
  const full    = `제목: ${subject}\n\n${body}`;
  navigator.clipboard.writeText(full).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 복사됨';
    setTimeout(() => { btn.textContent = '📋 메일 복사'; }, 2000);
  });
}

// ── 매칭 실행 ──
function runMatch() {
  document.getElementById('status').textContent = '분석 중...';

  // INB를 BL No. 기준으로 맵핑
  const inbMap = {};
  inbData.forEach(r => {
    const bl = r['B/L No.'] || '';
    if (bl) inbMap[bl] = r;
  });

  // DG LIST를 BL No. 기준으로 그룹핑
  const dgMap = {};
  dgData.forEach(r => {
    const bl = r['BLNO'] || r['B/L No.'] || '';
    if (!dgMap[bl]) dgMap[bl] = [];
    dgMap[bl].push(r);
  });

  // 매칭
  const results = [];
  Object.keys(dgMap).forEach(bl => {
    const inb = inbMap[bl] || {};
    const dgRows = dgMap[bl];

    // 컨테이너 목록
    const cntrs = [...new Set(dgRows.map(r => r['CNTR No']).filter(Boolean))];

    // IMDG/UN 목록
    const dgItems = dgRows.map(r => ({
      imdg: r['IMDG'] || '',
      un: r['UNNO'] || '',
      psn: r['적정선적명'] || '',
      wt: r['총중량'] || '',
    }));

    const termCode = inb['하선장소'] || '';
    const termInfo = TERMINAL_MAP[termCode] || termCode || '-';
    const hasDirect = inb['직반출'] === 'Y' || dgItems.some(d => isDirectClass(d.imdg));
    const is8 = dgItems.some(d => String(d.imdg).trim() === '8');

    results.push({
      bl,
      consignee: inb['Consignee Name'] || inb['Consignee'] || '-',
      notify: inb['Notify Name'] || inb['Notify'] || '-',
      customer: inb['Customer'] || '-',
      item: inb['Main Item'] || '-',
      직반출: inb['직반출'] || 'N',
      hasDirect,
      is8,
      tel: extractTel(inb['C.Name(AFR)'], inb['C.Addr(AFR)']),
      eta: inb['ETA'] || '-',
      terminal: termInfo,
      vyg: (inb['VSL'] || '') + ' ' + (inb['VYG'] || ''),
      cntrs,
      dgItems,
    });
  });

  // 통계
  const total = results.length;
  const cnt3 = results.filter(r => r.dgItems.some(d => String(d.imdg).startsWith('3'))).length;
  const cnt6 = results.filter(r => r.dgItems.some(d => String(d.imdg).startsWith('6'))).length;
  const cnt8 = results.filter(r => r.dgItems.some(d => String(d.imdg).startsWith('8'))).length;
  const cnt9 = results.filter(r => r.dgItems.some(d => String(d.imdg).startsWith('9'))).length;
  const cnt직반출 = results.filter(r => r.hasDirect).length;

  let html = `
    <div class="summary-bar">
      <span class="sum-badge sum-total">총 ${total}건</span>
      ${cnt3 ? `<span class="sum-badge sum-3">Class 3 · ${cnt3}건</span>` : ''}
      ${cnt6 ? `<span class="sum-badge sum-6">Class 6.1 · ${cnt6}건</span>` : ''}
      ${cnt8 ? `<span class="sum-badge sum-8">Class 8 · ${cnt8}건</span>` : ''}
      ${cnt9 ? `<span class="sum-badge sum-9">Class 9 · ${cnt9}건</span>` : ''}
      ${cnt직반출 ? `<span class="sum-badge" style="background:rgba(248,81,73,0.12);border:1px solid rgba(248,81,73,0.3);color:#f85149;">직반출 ${cnt직반출}건</span>` : ''}
    </div>
    <div class="result-wrap">
    <table>
      <thead><tr>
        <th>B/L No.</th>
        <th>Consignee</th>
        <th>Notify</th>
        <th>연락처</th>
        <th>Main Item</th>
        <th>직반출</th>
        <th>컨테이너</th>
        <th>IMDG</th>
        <th>UN No.</th>
        <th>PSN</th>
      </tr></thead>
      <tbody>`;

  let prevConsignee = null;
  results.forEach(r => {
    const rowspan = Math.max(r.dgItems.length, 1);
    const isNewGroup = normCN(r.consignee) !== normCN(prevConsignee || '');
    prevConsignee = r.consignee;

    r.dgItems.forEach((dg, idx) => {
      // 새 화주 그룹 시작 시 구분선 행 삽입
      const borderTop = (idx === 0 && isNewGroup)
        ? 'border-top: 2px solid #388bfd !important;'
        : '';

      html += `<tr>`;
      if (idx === 0) {
        html += `
          <td rowspan="${rowspan}" style="font-family:'IBM Plex Mono',monospace;font-size:11px;${borderTop}">${r.bl}</td>
          <td rowspan="${rowspan}" style="${borderTop}">${r.consignee}</td>
          <td rowspan="${rowspan}" style="${borderTop}">${r.notify}</td>
          <td rowspan="${rowspan}" style="font-size:11px;${borderTop}">${r.tel}</td>
          <td rowspan="${rowspan}" style="font-size:11px;${borderTop}">${r.item}</td>
          <td rowspan="${rowspan}" class="${r.hasDirect ? '직반출-y' : '직반출-n'}" style="cursor:${r.hasDirect?'pointer':'default'};${borderTop}" onclick="${r.hasDirect?'switchToMail(\''+r.bl+'\')':''}">${r.hasDirect ? (r.is8 ? '● 직반출 (72h)' : '● 직반출') : '-'}</td>
          <td rowspan="${rowspan}" class="cntr-cell" style="${borderTop}">${r.cntrs.join('<br>')}</td>`;
      }
      html += `
          <td style="${idx===0?borderTop:''}">${imdgBadge(dg.imdg)}</td>
          <td class="un-cell" style="${idx===0?borderTop:''}">${dg.un}</td>
          <td class="psn-cell" style="${idx===0?borderTop:''}">${dg.psn}</td>
        </tr>`;
    });
  });

  html += `</tbody></table></div>`;

  // Consignee 기준 정렬 - 특수문자/공백 제거 후 단순 문자열 비교
  // Consignee 정규화: 특수문자/공백 제거
  const normCN = s => (s || '').trim().replace(/[^가-힣a-zA-Z0-9]/g, '');
  results.sort((a, b) => {
    const ca = normCN(a.consignee);
    const cb = normCN(b.consignee);
    if (ca < cb) return -1;
    if (ca > cb) return 1;
    return a.bl < b.bl ? -1 : 1;
  });

  lastResults = results;
  document.getElementById('copyBtn').style.display = 'inline-block';
  document.getElementById('result-contact').innerHTML = html;
  document.getElementById('status').textContent = `총 ${total}건 분석 완료`;

  // 메일 탭 직반출 목록 업데이트
  renderMailList(null);
}
